<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon · 江穗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:100vw;
  height:100vh;
  background:url("IMG_7030.jpeg") no-repeat center;
  background-size:cover;
  color:#fff;
  font-family:system-ui;
  overflow:hidden;
  position:relative;
}
/* 雨丝动画 */
.rain{
  position:absolute;
  top:-100%;
  left:0;
  width:100%;
  height:200%;
  background-image:linear-gradient(transparent 0%, rgba(255,255,255,0.08) 100%);
  background-size:1px 80px;
  animation:rain 0.8s linear infinite;
  pointer-events:none;
}
@keyframes rain{
  0%{transform:translateY(-80px)}
  100%{transform:translateY(80px)}
}
/* 顶部手写标题 */
.top-title{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-family:cursive;
  font-size:12vw;
  color:#fff;
  opacity:0.9;
}
/* 中间日志文字 */
.log-text{
  position:absolute;
  top:42%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  letter-spacing:2px;
  font-size:14px;
  line-height:2.2;
  opacity:0.85;
}
/* 改名输入框区域 */
.change-box{
  position:absolute;
  top:62%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}
.change-title{
  font-size:28px;
  letter-spacing:4px;
  margin-bottom:25px;
  opacity:0.9;
}
.input-box{
  border:1px solid #fff;
  width:140px;
  margin:0 auto 15px;
}
.input-box div{
  padding:10px 0;
  font-size:22px;
  border-bottom:1px solid #fff;
}
.input-box div:last-child{border-bottom:none}
.btns{
  display:flex;
  justify-content:center;
  gap:8px;
  margin:15px 0;
}
.btns button{
  background:#4285f4;
  color:#fff;
  border:none;
  padding:8px 18px;
  font-size:16px;
}
.btns button:last-child{background:#999}
.bottom-tip{
  font-size:17px;
  margin-top:20px;
  opacity:0.9;
}
</style>
</head>
<body>
<div class="rain"></div>
<div class="top-title">Lemon</div>

<div class="log-text">
'26.05.11 ………………… 五条悟 +1<br>
LOG：RES：OFFLINE
</div>

<div class="change-box">
  <div class="change-title">NAME CHANGE</div>
  <div class="input-box">
    <div>江</div>
    <div>穗</div>
  </div>
  <div class="btns">
    <button>OK</button>
    <button>NO</button>
  </div>
  <div class="bottom-tip">你的名字是 江穗。</div>
</div>
</body>
</html>
