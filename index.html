<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STORY · 雨庭文集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('IMG_7030.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Courier New', 'Times New Roman', 'Georgia', serif;
            color: #e8e6e0;
            padding: 28px 18px 70px;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.6);
            z-index: 0;
        }
        #rainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .hero {
            text-align: center;
            margin: 20px 0 20px;
            padding: 20px 0 30px;
        }
        .story-word {
            font-family: 'Georgia', 'Times New Roman', cursive;
            font-size: 68px;
            font-weight: 400;
            letter-spacing: 8px;
            color: #e3dac9;
            text-shadow: 0 0 6px rgba(227,218,201,0.3);
            position: relative;
            display: inline-block;
        }
        .story-word::after {
            content: attr(data-text);
            position: absolute;
            top: 74px;
            left: 0;
            font-size: 68px;
            letter-spacing: 8px;
            color: rgba(227,218,201,0.18);
            transform: scaleY(-0.55) translateY(10px);
            z-index: -1;
        }
        .sub {
            font-size: 12px;
            letter-spacing: 3px;
            color: #8b8a7a;
            margin-top: 28px;
            font-style: italic;
        }
        .date-line {
            text-align: right;
            font-size: 11px;
            color: #6a6e7c;
            border-bottom: 1px solid #232833;
            padding-bottom: 12px;
            margin-bottom: 28px;
        }
        /* 名字输入栏 */
        .name-bar {
            background: #0f141fcc;
            backdrop-filter: blur(4px);
            border: 1px solid #2f3645;
            border-radius: 44px;
            padding: 10px 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .name-bar label {
            font-size: 12px;
            background: #1f2533;
            padding: 4px 14px;
            border-radius: 60px;
            color: #cbc6ae;
        }
        #globalNameInput {
            flex: 1;
            background: #070b12;
            border: 1px solid #3d4457;
            padding: 8px 16px;
            color: #f0e7d4;
            font-family: monospace;
            font-size: 14px;
            border-radius: 40px;
            outline: none;
        }
        .section {
            margin-bottom: 52px;
        }
        .section-title {
            font-size: 28px;
            font-weight: 400;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            color: #e2cf9c;
            border-left: 3px solid #c8b280;
            padding-left: 18px;
            margin-bottom: 28px;
        }
        .story-link {
            display: block;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: #0c111bcc;
            backdrop-filter: blur(2px);
            border-radius: 20px;
            border: 1px solid #282f3e;
            color: #f3efdf;
            text-decoration: none;
            font-size: 18px;
            transition: 0.2s;
        }
        footer {
            text-align: center;
            margin-top: 56px;
            font-size: 10px;
            color: #50566b;
            border-top: 1px solid #202530;
            padding-top: 28px;
        }
        @media (max-width: 550px) {
            .story-word { font-size: 48px; }
            .story-word::after { font-size: 48px; top: 52px; }
            .section-title { font-size: 24px; }
        }
    </style>
</head>
<body>

<canvas id="rainCanvas"></canvas>

<div class="container">
    <div class="hero">
        <div class="story-word" data-text="STORY">STORY</div>
        <div class="sub">‖ 雨庭 · 残響 ‖</div>
    </div>

    <div class="date-line">'26.05.16  ·  离线雨境</div>

    <!-- 全局名字输入框 -->
    <div class="name-bar">
        <label>✎ 主角名</label>
        <input type="text" id="globalNameInput" placeholder="输入名字替换「江穗」" value="江穗">
    </div>

    <div class="section">
        <div class="section-title">✦ 我和你</div>
        <a href="#" class="story-link" data-story="story1.html">《关于五条悟》</a>
        <a href="#" class="story-link" data-story="story2.html">《夏恋》</a>
    </div>

    <div class="section">
        <div class="section-title">✦ 给亲友的奏鸣曲</div>
        <a href="#" class="story-link" data-story="story3.html">《Amireux》</a>
        <a href="#" class="story-link" data-story="story4.html">《关于你》</a>
    </div>

    <footer>雨水浸透词语 · 名字即咒语</footer>
</div>

<script>
    // 下雨效果
    const canvas = document.getElementById('rainCanvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let raindrops = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    function initRain() {
        const dropCount = Math.floor(width * 0.3);
        raindrops = [];
        for (let i = 0; i < dropCount; i++) {
            raindrops.push({
                x: Math.random() * width,
                y: Math.random() * height,
                length: 8 + Math.random() * 12,
                speed: 3 + Math.random() * 6
            });
        }
    }

    function drawRain() {
        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(200, 210, 230, 0.35)';
        ctx.lineWidth = 1;
        for (let drop of raindrops) {
            ctx.beginPath();
            ctx.moveTo(drop.x, drop.y);
            ctx.lineTo(drop.x, drop.y + drop.length);
            ctx.stroke();
            drop.y += drop.speed;
            if (drop.y > height) {
                drop.y = -drop.length;
                drop.x = Math.random() * width;
            }
        }
        requestAnimationFrame(drawRain);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initRain();
    });
    resizeCanvas();
    initRain();
    drawRain();

    // 点击小说链接时，把名字带到 URL 参数里
    const nameInput = document.getElementById('globalNameInput');
    const links = document.querySelectorAll('.story-link');

    function handleLinkClick(e) {
        e.preventDefault();
        const storyPage = this.getAttribute('data-story');
        let name = nameInput.value.trim();
        if (name === "") name = "江穗";
        window.location.href = storyPage + '?name=' + encodeURIComponent(name);
    }

    links.forEach(link => {
        link.addEventListener('click', handleLinkClick);
    });
</script>
</body>
</html>
