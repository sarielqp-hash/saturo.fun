<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的网站</title>
<style>
*{box-sizing:border-box;font-family:system-ui;margin:0;padding:0}
body{max-width:800px;margin:0 auto;padding:20px;background:#f9f9f9}
.title{font-size:24px;margin-bottom:20px}
.comment-box{margin-top:40px}
textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;height:100px;margin-bottom:10px}
button{padding:8px 18px;background:#222;color:#fff;border:none;border-radius:4px;cursor:pointer}
.comment-item{background:#fff;padding:12px;border-radius:6px;margin:8px 0}
.time{font-size:12px;color:#666;margin-top:5px}
</style>

<!-- 第三方免费评论系统 Valine -->

</div>
