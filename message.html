<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>留言 · 关于·我们</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            min-height: 100%;
        }
        body {
            background-image: url('IMG_7030.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Courier New', 'Times New Roman', 'Georgia', serif;
            color: #e8e6e0;
            padding: 28px 18px 70px;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 23, 0.6);
            z-index: 0;
        }
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: none;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .back-link{
            display:block;
            text-align:center;
            margin-bottom:30px;
            color:#e2cf9c;
            text-decoration:none;
            font-size:14px;
        }
        .section-title {
            font-size: 28px;
            font-weight: 400;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            color: #e2cf9c;
            border-left: 3px solid #c8b280;
            padding-left: 18px;
            margin-bottom: 28px;
        }
        footer {
            text-align: center;
            margin-top: 56px;
            font-size: 10px;
            color: #50566b;
            border-top: 1px solid #202530;
            padding-top: 28px;
        }
        #vcomments {
            color: #e8e6e0;
        }
        /* 隐藏所有输入、回复、按钮 */
        .vinput, .vbtn, .vcard .vreply, .vmeta {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/valine@1.4.14/dist/Valine.min.js"></script>
</head>
<body>
<canvas id="snowCanvas"></canvas>
<div class="container">
    <a href="index.html" class="back-link">← 返回主页</a>
    <div class="section-title">✦ 所有留言与回复</div>
    <div id="vcomments"></div>
    <footer>我们的故事· 刚刚开始</footer>
</div>
<script>
    // 下雪动画
    (function() {
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let snowflakes = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function initSnow() {
            const count = Math.floor(width * 0.35);
            snowflakes = [];
            for (let i = 0; i < count; i++) {
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * -height,
                    radius: Math.random() * 1.2 + 0.4,
                    speed: Math.random() * 1 + 0.6,
                    sway: Math.random() * 0.8 - 0.4
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            for (let flake of snowflakes) {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                ctx.fill();
                flake.y += flake.speed;
                flake.x += flake.sway;
                if (flake.y > height) {
                    flake.y = -10;
                    flake.x = Math.random() * width;
                }
            }
            requestAnimationFrame(drawSnow);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initSnow();
        });
        resizeCanvas();
        initSnow();
        drawSnow();
    })();

    new Valine({
      el: '#vcomments',
      appId: '2mZ8xYk8nQdF9v7e0aGj9s0A-gzGzoHsz',
      appKey: 'fD8vX9qK4L2mP7zR1sN5bC6',
      placeholder: '',
      avatar: 'hide',
      dark: true,
      requiredFields: [],
      meta: [],
      enableQQ: false,
      noRecordIP: true,
      pageSize: 20,
      visitor: false
    })
</script>
</body>
</html>
